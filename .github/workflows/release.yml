name: Release (Linux + Windows)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    name: Linux build (.deb + AppImage)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: app-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libayatana-appindicator3-dev \
            libxdo-dev libdbus-1-dev libssl-dev \
            libsecret-1-dev libwebkit2gtk-4.1-dev \
            file desktop-file-utils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app-rs

      - name: Run tests
        run: cargo test --release --bin claude-usage-bar

      - name: Build release binary
        run: cargo build --release

      - name: Size gate (<=10MB stripped)
        run: |
          size=$(stat -c%s target/release/claude-usage-bar)
          echo "binary size: $size bytes"
          if [ "$size" -gt 10485760 ]; then
            echo "::error::binary exceeds 10MB"
            exit 1
          fi

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb
        run: cargo deb --no-build

      - name: Build AppImage
        run: |
          sudo apt-get install -y wget fuse libfuse2
          cd ..
          bash packaging/linux/appimage/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            app-rs/target/debian/*.deb
            app-rs/target/appimage/*.AppImage

  windows:
    name: Windows build (.msi)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app-rs
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app-rs

      - name: Run tests
        run: cargo test --release --bin claude-usage-bar

      - name: Build release binary
        run: cargo build --release

      - name: Size gate (<=12MB stripped)
        run: |
          $size = (Get-Item target\release\claude-usage-bar.exe).Length
          Write-Host "binary size: $size bytes"
          if ($size -gt 12582912) { Write-Error "binary exceeds 12MB" }

      - name: Install WiX 6
        run: dotnet tool install --global wix

      - name: Generate .ico
        run: |
          Add-Type -AssemblyName System.Drawing
          $png = Join-Path $PWD '..\app\claudeusagebar-icon.png'
          $ico = Join-Path $PWD 'app.ico'
          $bmp = [System.Drawing.Image]::FromFile($png)
          $icon = [System.Drawing.Icon]::FromHandle(([System.Drawing.Bitmap]$bmp).GetHicon())
          $fs = [System.IO.File]::OpenWrite($ico)
          $icon.Save($fs); $fs.Close()

      - name: Build MSI
        working-directory: packaging\windows\wix
        run: |
          wix extension add WixToolset.UI.wixext
          wix build -ext WixToolset.UI.wixext -out ClaudeUsageBar-1.2.1-x64.msi installer.wxs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: packaging/windows/wix/*.msi

  release:
    name: Publish GitHub Release
    needs: [linux, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/linux/*.deb
            dist/linux/*.AppImage
            dist/windows/*.msi
          generate_release_notes: true
